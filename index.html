<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Multi Viewer Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
min-height:100vh;
}

header{
padding:18px;
background:#020617;
border-bottom:1px solid #1e293b;
font-size:28px;
font-weight:700;
}

.control-panel{
padding:20px;
background:#111827;
}

textarea{
width:100%;
height:180px;
padding:12px;
border:none;
border-radius:10px;
resize:vertical;
font-size:14px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.primary{
background:#2563eb;
color:white;
}

.primary:hover{
background:#1d4ed8;
}

.danger{
background:#dc2626;
color:white;
}

.danger:hover{
background:#b91c1c;
}

.success{
background:#16a34a;
color:white;
}

.success:hover{
background:#15803d;
}

.info{
margin-top:15px;
font-size:14px;
color:#cbd5e1;
}

#viewer{
padding:10px;
display:grid;
gap:10px;
}

.player-box{
background:#111827;
border-radius:12px;
overflow:hidden;
border:1px solid #334155;
}

.player-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#1e293b;
font-size:12px;
}

.player-controls{
display:flex;
gap:5px;
}

.small-btn{
padding:6px 10px;
font-size:11px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2563eb;
color:white;
}

.small-btn:hover{
background:#1d4ed8;
}

iframe{
width:100%;
height:280px;
border:none;
}

@media(max-width:768px){
iframe{
height:220px;
}
}

</style>
</head>

<body>

<header>
🎬 YouTube Multi Viewer Pro
</header>

<div class="control-panel">

<h3>Enter YouTube URLs (One Per Line)</h3>

<br>

<textarea id="urls" placeholder="Paste YouTube URLs here..."></textarea>

<div class="row">

<button class="primary" onclick="loadVideos()">
Load Videos
</button>

<button class="success" onclick="saveUrls()">
Save URLs
</button>

<button class="danger" onclick="clearAll()">
Clear
</button>

</div>

<div class="info" id="status">
Ready
</div>

</div>

<div id="viewer"></div>

<script>

const viewer = document.getElementById("viewer");

window.onload = function(){

const saved = localStorage.getItem("yt_urls");

if(saved){

document.getElementById("urls").value = saved;

setTimeout(()=>{
loadVideos();
},500);

}

};

function saveUrls(){

localStorage.setItem(
"yt_urls",
document.getElementById("urls").value
);

alert("URLs saved successfully");

}

function clearAll(){

viewer.innerHTML = "";

document.getElementById("urls").value = "";

localStorage.removeItem("yt_urls");

document.getElementById("status").innerHTML =
"Cleared";

}

function getYoutubeID(url){

try{

url = url.trim();

if(url.includes("youtu.be/")){
return url.split("youtu.be/")[1].split("?")[0];
}

if(url.includes("watch?v=")){
return new URL(url).searchParams.get("v");
}

if(url.includes("/embed/")){
return url.split("/embed/")[1].split("?")[0];
}

}catch(e){}

return null;

}

function createEmbed(url){

const id = getYoutubeID(url);

if(!id) return null;

return `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&playsinline=1&rel=0&enablejsapi=1&origin=${window.location.origin}`;

}

function getColumns(count){

if(count <= 1) return 1;
if(count <= 4) return 2;
if(count <= 9) return 3;
if(count <= 16) return 4;
if(count <= 25) return 5;
if(count <= 36) return 6;
if(count <= 49) return 7;

return 8;

}

function loadVideos(){

viewer.innerHTML = "";

const urls = document
.getElementById("urls")
.value
.split("\n")
.map(x => x.trim())
.filter(x => x !== "");

const cols = getColumns(urls.length);

viewer.style.gridTemplateColumns =
`repeat(${cols},1fr)`;

let loaded = 0;

urls.forEach((url,index)=>{

const embed = createEmbed(url);

if(!embed) return;

const box = document.createElement("div");
box.className = "player-box";

const header = document.createElement("div");
header.className = "player-header";

const title = document.createElement("span");
title.innerText = "Video " + (index+1);

const controls = document.createElement("div");
controls.className = "player-controls";

const fullBtn = document.createElement("button");
fullBtn.className = "small-btn";
fullBtn.innerText = "Fullscreen";

const removeBtn = document.createElement("button");
removeBtn.className = "small-btn";
removeBtn.innerText = "Remove";

const frame = document.createElement("iframe");

frame.loading = "lazy";

frame.allow =
"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen";

frame.allowFullscreen = true;

frame.src = embed;

fullBtn.onclick = ()=>{

if(frame.requestFullscreen){
frame.requestFullscreen();
}

};

removeBtn.onclick = ()=>{

box.remove();

document.getElementById("status").innerHTML =
document.querySelectorAll(".player-box").length +
" videos loaded";

};

controls.appendChild(fullBtn);
controls.appendChild(removeBtn);

header.appendChild(title);
header.appendChild(controls);

box.appendChild(header);
box.appendChild(frame);

viewer.appendChild(box);

loaded++;

});

document.getElementById("status").innerHTML =
loaded + " videos loaded";

}

</script>

</body>
</html>
